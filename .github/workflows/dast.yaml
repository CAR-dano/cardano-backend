name: DAST — OWASP ZAP Scan

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target URL to scan'
        required: true
        default: 'https://prod-api.inspeksimobil.id'
        type: string
      scan_type:
        description: 'Scan type'
        required: true
        default: 'baseline'
        type: choice
        options:
          - baseline      # Quick scan (5-10 menit)
          - full          # Full scan (30-60 menit)
  schedule:
    - cron: '0 4 * * 1'  # Setiap Senin jam 11:00 WIB

jobs:
  zap-scan:
    name: 🕷️ OWASP ZAP Scan
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set scan target
        id: target
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "url=https://prod-api.inspeksimobil.id" >> $GITHUB_OUTPUT
            echo "type=baseline" >> $GITHUB_OUTPUT
          else
            echo "url=${{ inputs.target_url }}" >> $GITHUB_OUTPUT
            echo "type=${{ inputs.scan_type }}" >> $GITHUB_OUTPUT
          fi

      - name: OWASP ZAP Baseline Scan
        if: steps.target.outputs.type == 'baseline'
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ steps.target.outputs.url }}
          rules_file_name: '.github/zap-rules.tsv'
          cmd_options: '-a -j'
          issue_title: '🕷️ ZAP Baseline Scan Report'
          fail_action: false

      - name: OWASP ZAP Full Scan
        if: steps.target.outputs.type == 'full'
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          target: ${{ steps.target.outputs.url }}
          rules_file_name: '.github/zap-rules.tsv'
          cmd_options: '-a -j'
          issue_title: '🕷️ ZAP Full Scan Report'
          fail_action: false

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report_html.html
          retention-days: 30
