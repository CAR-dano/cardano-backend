name: CI Pipeline

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────
  # Job 1: Lint & Format
  # ──────────────────────────────────────────
  lint:
    name: 🔍 Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run ESLint
        run: npm run lint

  # ──────────────────────────────────────────
  # Job 2: Unit Tests + Coverage
  # ──────────────────────────────────────────
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run unit tests with coverage
        run: npm run test:cov

      - name: Check coverage threshold
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            COVERAGE=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
            echo "📊 Line coverage: ${COVERAGE}%"
            if (( $(echo "$COVERAGE < 60" | bc -l) )); then
              echo "❌ Coverage below 60% threshold!"
              exit 1
            fi
            echo "✅ Coverage meets threshold"
          else
            echo "⚠️ No coverage report found, skipping threshold check"
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # ──────────────────────────────────────────
  # Job 3: E2E Tests
  # ──────────────────────────────────────────
  e2e-tests:
    name: 🔗 E2E Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db?schema=public

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          # Database
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db?schema=public
          # App
          NODE_ENV: test
          PORT: 3010
          CLIENT_BASE_URL: http://localhost:3000
          # JWT (dummy secrets — only for signing test tokens)
          JWT_SECRET: ci-test-jwt-secret-not-for-production
          JWT_REFRESH_SECRET: ci-test-jwt-refresh-secret-not-for-production
          JWT_EXPIRATION: 1h
          JWT_REFRESH_EXPIRATION: 7d
          # Redis (service container above)
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          # IPFS (disabled — point to localhost, tests should gracefully handle no IPFS)
          IPFS_URL: http://localhost:5001
          # Blockfrost / Cardano (dummy — blockchain tests should be skipped in unit/e2e CI)
          BLOCKFROST_API_KEY: testnotarealkey
          BLOCKFROST_NETWORK: preprod
          # S3 / Storage (dummy)
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: ap-southeast-1
          AWS_S3_BUCKET: test-bucket
          # HashiCorp Vault (disabled — falls back to env vars)
          VAULT_ENABLED: false
          VAULT_ADDR: http://localhost:8200
          VAULT_TOKEN: dummy-vault-token

  # ──────────────────────────────────────────
  # Job 4: SAST — npm audit
  # ──────────────────────────────────────────
  sast-audit:
    name: 🛡️ Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run npm audit (high + critical)
        run: npm audit --audit-level=high || true

      - name: Summary
        if: always()
        run: |
          echo "## 🛡️ Dependency Audit Results" >> $GITHUB_STEP_SUMMARY
          npm audit --json 2>/dev/null | jq -r '
            "| Severity | Count |",
            "|----------|-------|",
            "| Critical | \(.metadata.vulnerabilities.critical) |",
            "| High | \(.metadata.vulnerabilities.high) |",
            "| Moderate | \(.metadata.vulnerabilities.moderate) |",
            "| Low | \(.metadata.vulnerabilities.low) |"
          ' >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No audit data" >> $GITHUB_STEP_SUMMARY
