name: CI Pipeline

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────
  # Job 1: Lint & Format
  # ──────────────────────────────────────────
  lint:
    name: 🔍 Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run ESLint
        run: npm run lint

  # ──────────────────────────────────────────
  # Job 2: Unit Tests + Coverage
  # ──────────────────────────────────────────
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run unit tests with coverage
        run: npm run test:cov

      - name: Check coverage threshold
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            COVERAGE=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
            echo "📊 Line coverage: ${COVERAGE}%"
            if (( $(echo "$COVERAGE < 60" | bc -l) )); then
              echo "❌ Coverage below 60% threshold!"
              exit 1
            fi
            echo "✅ Coverage meets threshold"
          else
            echo "⚠️ No coverage report found, skipping threshold check"
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # ──────────────────────────────────────────
  # Job 3: E2E Tests
  # ──────────────────────────────────────────
  e2e-tests:
    name: 🔗 E2E Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db?schema=public

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db?schema=public
          NODE_ENV: test
          PORT: 3010

  # ──────────────────────────────────────────
  # Job 4: SAST — npm audit
  # ──────────────────────────────────────────
  sast-audit:
    name: 🛡️ Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run npm audit (high + critical)
        run: npm audit --audit-level=high || true

      - name: Summary
        if: always()
        run: |
          echo "## 🛡️ Dependency Audit Results" >> $GITHUB_STEP_SUMMARY
          npm audit --json 2>/dev/null | jq -r '
            "| Severity | Count |",
            "|----------|-------|",
            "| Critical | \(.metadata.vulnerabilities.critical) |",
            "| High | \(.metadata.vulnerabilities.high) |",
            "| Moderate | \(.metadata.vulnerabilities.moderate) |",
            "| Low | \(.metadata.vulnerabilities.low) |"
          ' >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No audit data" >> $GITHUB_STEP_SUMMARY
