name: CD Pipeline — Build & Deploy

on:
  push:
    branches: [main, staging]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────
  # Job 1: Build & Scan Docker Image
  # ──────────────────────────────────────────
  build-and-push:
    name: 🐳 Build, Scan & Push
    runs-on: ubuntu-latest
    # Pastikan CI sudah OK sebelum deploy
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Set Docker tag and Coolify webhook
        id: config
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "webhook_url=${{ secrets.COOLIFY_WEBHOOK_PRODUCTION }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "staging" ]; then
            echo "tag=staging" >> $GITHUB_OUTPUT
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "webhook_url=${{ secrets.COOLIFY_WEBHOOK_STAGING }}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cardano-backend:${{ steps.config.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/cardano-backend:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Container Security Scan ──
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/cardano-backend:${{ steps.config.outputs.tag }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Trivy summary
        if: always()
        run: |
          echo "## 🐳 Container Scan Results" >> $GITHUB_STEP_SUMMARY
          # Kami tampilkan HIGH dan CRITICAL di summary job
          echo '```' >> $GITHUB_STEP_SUMMARY
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy image \
            --severity HIGH,CRITICAL \
            --quiet \
            --format table \
            ${{ secrets.DOCKERHUB_USERNAME }}/cardano-backend:${{ steps.config.outputs.tag }} \
            >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      # ── Push to DockerHub ──
      - name: Push Docker image to DockerHub
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cardano-backend:${{ steps.config.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/cardano-backend:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Trigger Coolify Deploy (Authenticated) ──
      - name: Trigger Coolify Deployment
        run: |
          curl -X POST "${{ steps.config.outputs.webhook_url }}" \
               -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
               -s -f || { echo "❌ Coolify deployment trigger failed"; exit 1; }
          echo "✅ Coolify deployment triggered successfully"

      - name: Post-deploy summary
        run: |
          echo "## 🚀 Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ steps.config.outputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ secrets.DOCKERHUB_USERNAME }}/cardano-backend:${{ steps.config.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| SHA | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
