name: CD Pipeline — Build & Deploy

on:
  push:
    branches: [main, staging]

# CD hanya berjalan setelah CI workflow sukses pada commit yang sama
# Pastikan branch protection rules enforce ini juga di GitHub Settings

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────
  # Job 0: Gate — Tunggu CI Selesai
  # ──────────────────────────────────────────
  wait-for-ci:
    name: ⏳ Wait for CI
    runs-on: ubuntu-latest
    steps:
      - name: Check CI workflow status
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: '🔍 Lint & Format'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 20
          allowed-conclusions: success

      - name: Check unit tests status
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: '🧪 Unit Tests'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 20
          allowed-conclusions: success

      - name: Check e2e tests status
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: '🔗 E2E Tests'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 20
          allowed-conclusions: success

  # ──────────────────────────────────────────
  # Job 1: Build, Scan & Push Docker Image
  # ──────────────────────────────────────────
  build-and-push:
    name: 🐳 Build, Scan & Push
    runs-on: ubuntu-latest
    needs: wait-for-ci
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Set Docker tag and environment
        id: config
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
            echo "environment=production" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "staging" ]; then
            echo "tag=staging" >> $GITHUB_OUTPUT
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image (local, for scanning)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cardano-backend:${{ steps.config.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/cardano-backend:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Container Security Scan ──
      - name: Run Trivy vulnerability scanner
        id: trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/cardano-backend:${{ steps.config.outputs.tag }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Trivy summary (from SARIF)
        if: always()
        run: |
          echo "## 🐳 Container Scan Results" >> $GITHUB_STEP_SUMMARY
          if [ -f trivy-results.sarif ]; then
            COUNT=$(cat trivy-results.sarif | jq '.runs[0].results | length' 2>/dev/null || echo "N/A")
            echo "- Found **${COUNT}** HIGH/CRITICAL findings. See **Security** tab for details." >> $GITHUB_STEP_SUMMARY
          else
            echo "- No SARIF output found." >> $GITHUB_STEP_SUMMARY
          fi

      # ── Push to DockerHub ──
      - name: Push Docker image to DockerHub
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cardano-backend:${{ steps.config.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/cardano-backend:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Trigger Coolify Deploy (Authenticated Webhook) ──
      - name: Trigger Coolify Deployment
        run: |
          if [ "${{ steps.config.outputs.environment }}" = "production" ]; then
            WEBHOOK_URL="${{ secrets.COOLIFY_WEBHOOK_PRODUCTION }}"
          else
            WEBHOOK_URL="${{ secrets.COOLIFY_WEBHOOK_STAGING }}"
          fi
          echo "🚀 Triggering Coolify deploy for: ${{ steps.config.outputs.environment }}"
          curl -X POST "${WEBHOOK_URL}" \
               -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
               -s -f || { echo "❌ Coolify deployment trigger failed"; exit 1; }
          echo "✅ Coolify deployment triggered successfully"

      - name: Post-deploy summary
        run: |
          echo "## 🚀 Deployment Triggered" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ steps.config.outputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ secrets.DOCKERHUB_USERNAME }}/cardano-backend:${{ steps.config.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| SHA | \`sha-${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
